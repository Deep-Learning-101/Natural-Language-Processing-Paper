name: Sync All MD Files to Main Site

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md' # 只要任何 markdown 檔案有變動，就觸發執行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sub Repo
        uses: actions/checkout@v4
        with:
          path: sub-repo

      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          repository: Deep-Learning-101/deep-learning-101.github.io
          token: ${{ secrets.GH_PAT }}
          path: main-repo

      - name: Copy Markdown Files to Main Site
        run: |
          # 1. 處理 NLP 核心：把 README.md 改名並搬過去
          cp sub-repo/README.md main-repo/Natural-Language-Processing.md
          
          # 2. 處理 LLM 核心：明確指定搬移 (加上 -f 防呆檢查，確定檔案存在才搬)
          if [ -f "sub-repo/Large-Language-Model.md" ]; then
            cp sub-repo/Large-Language-Model.md main-repo/Large-Language-Model.md
          fi
          
          # 3. 處理未來新增的其他頁面 (例如 Nemotron.md)：自動批次搬運
          cd sub-repo
          for file in *.md; do
            # 確保是檔案，且排除掉前面已經手動搬過的兩個核心檔案，剩下的全搬
            if [ -f "$file" ] && [ "$file" != "README.md" ] && [ "$file" != "Large-Language-Model.md" ]; then
              cp "$file" ../main-repo/
            fi
          done

      - name: Commit and Push to Main Site
        run: |
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將所有變動的 .md 檔案加入 git 追蹤
          git add *.md
          
          # 檢查是否有內容差異，有差異才 commit，避免發生 Nothing to commit 錯誤
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync all updated Markdown files from NLP-Paper"
          git push