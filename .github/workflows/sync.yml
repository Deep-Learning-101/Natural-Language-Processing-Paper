name: Sync NLP Content and Assets

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - '**/images/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sub Repo
        uses: actions/checkout@v4
        with:
          path: sub-repo

      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          repository: Deep-Learning-101/deep-learning-101.github.io
          token: ${{ secrets.GH_PAT }}
          path: main-repo

      - name: Sync and Mirror Structure
        run: |
          # 1. 處理 NLP 核心檔案搬至根目錄
          cp sub-repo/README.md main-repo/Natural-Language-Processing.md
          if [ -f "sub-repo/Large-Language-Model.md" ]; then
            cp sub-repo/Large-Language-Model.md main-repo/Large-Language-Model.md
          fi
          
          # 2. 全資源鏡像：掃描所有資料夾並完整複製 (含 md, png, gif)
          cd sub-repo
          find . -maxdepth 1 -type d | while read dir; do
            # 排除 git 相關資料夾
            if [ "$dir" != "." ] && [ "$dir" != "./.github" ] && [ "$dir" != "./.git" ]; then
              mkdir -p "../main-repo/$dir"
              cp -a "$dir/." "../main-repo/$dir/"
            fi
          done

      - name: Commit and Push
        run: |
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # 擷取子站原始 Commit 訊息
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          
          # 同步推送至主站
          git diff --quiet && git diff --staged --quiet || git commit -m "NLP Sync: $ORIGINAL_MSG"
          git push