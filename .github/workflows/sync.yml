name: Sync Natural-Language-Processing

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - 'Large-Language-Model.md'
      - '_includes/ai-share.html'
      - '**/images/**'
      - 'DeepKE/**'      # 增加：監控特定的 NLP 子專案
      - 'ERNIE-Layout/**' # 增加：監控特定的 NLP 子專案
      - '.github/workflows/sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sub Repo
        uses: actions/checkout@v4
        with:
          path: sub-repo
          fetch-depth: 0 # 必須設定 0 以偵測變動檔案

      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          repository: Deep-Learning-101/deep-learning-101.github.io
          token: ${{ secrets.GH_PAT }}
          path: main-repo
          fetch-depth: 0

      # 步驟 1：偵測變動檔案類型
      - name: Check which files changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            readme:
              - 'README.md'
            llm:
              - 'Large-Language-Model.md'
            includes:
              - '_includes/ai-share.html'
            images:
              - '**/images/**'
            assets:
              - '[!._]*/**' # 偵測除了隱藏資料夾外的所有子目錄變動

      # 步驟 2：執行選擇性同步
      - name: Selective Sync
        run: |
          # 1. 只有 README 更新時才處理 NLP 核心
          if [ "${{ steps.filter.outputs.readme }}" == 'true' ]; then
            echo "Syncing NLP README..."
            cp sub-repo/README.md main-repo/Natural-Language-Processing.md
          fi

          # 2. 只有 LLM 檔案存在且更新時才處理
          if [ "${{ steps.filter.outputs.llm }}" == 'true' ] && [ -f "sub-repo/Large-Language-Model.md" ]; then
            echo "Syncing LLM Core..."
            cp sub-repo/Large-Language-Model.md main-repo/Large-Language-Model.md
          fi

          # 3. 只有 ai-share.html 修改時才同步 _includes
          if [ "${{ steps.filter.outputs.includes }}" == 'true' ]; then
            echo "Syncing _includes (ai-share.html)..."
            mkdir -p main-repo/_includes
            cp sub-repo/_includes/ai-share.html main-repo/_includes/ai-share.html
          fi

          # 4. 只有子目錄變動時才執行鏡像同步[cite: 1]
          if [ "${{ steps.filter.outputs.assets }}" == 'true' ] || [ "${{ steps.filter.outputs.images }}" == 'true' ]; then
            echo "Syncing sub-directories (DeepKE, ERNIE-Layout, images)..."
            cd sub-repo
            find . -maxdepth 1 -type d ! -name "." ! -name ".github" ! -name ".git" ! -name "_includes" | while read dir; do
              mkdir -p "../main-repo/$dir"
              cp -a "$dir/." "../main-repo/$dir/"
            done
          fi

      - name: Commit and Push
        run: |
          cd main-repo
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_EMAIL="${{ github.event.head_commit.author.email }}"
          SUB_SHA="${{ github.sha }}"

          git config user.name "${AUTHOR_NAME:-github-actions[bot]}"
          git config user.email "${AUTHOR_EMAIL:-github-actions[bot]@users.noreply.github.com}"

          git add .

          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "NLP Selective Sync: $ORIGINAL_MSG (From Sub: ${SUB_SHA:0:7})"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected, skipping sync."
          fi
